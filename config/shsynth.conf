# SHR-DAW runtime and routing configuration v5
synth.startup_timeout_ms=6000

# Held-note and chord spelling: german uses B/H; english uses A#/B.
display.note_names=german

# synthv1 (legacy synth.* and presets.directory keys are still accepted).
synthv1.command=synthv1_jack
synthv1.client=shs-synthv1
# Empty uses the installed/bundled MIT and local preset directory.
synthv1.presets=
synthv1.midi_output=synthv1

# Yoshimi is optional. Instruments are indexed in place, never copied. The
# category filter deliberately keeps the appliance browser compact; each root
# may contain nested banks.
yoshimi.command=yoshimi
yoshimi.client=shs-yoshimi
yoshimi.midi_output=yoshimi
yoshimi.preset_root=/usr/share/yoshimi/banks
yoshimi.preset_root=/usr/share/zynaddsubfx/banks
yoshimi.preset_root=~/.local/share/yoshimi/banks
yoshimi.category=bass
yoshimi.category=lead
yoshimi.category=pad
yoshimi.category=pluck
yoshimi.category=bell
yoshimi.category=organ
yoshimi.category=drone
yoshimi.category=keys
yoshimi.presets_per_category=8

# FluidSynth is optional. Add one or more installed SF2/SF3 files. TimGM6mb is
# the small Debian default; put a preferred SoundFont first when upgrading.
fluidsynth.command=fluidsynth
fluidsynth.client=shs-fluidsynth
fluidsynth.midi_output=shs-fluidsynth
fluidsynth.gain=0.4
fluidsynth.soundfont=/usr/share/sounds/sf2/TimGM6mb.sf2
fluidsynth.soundfont=/usr/share/sounds/sf3/TimGM6mb.sf3

# Controller input entries are case-insensitive fallback matches, in priority
# order. controller.conf's input setting overrides this legacy list. Unmatched
# controller traffic remains musical by default for one combined device; set
# controller_musical_input=false for a control-surface-only port. Every
# performance_input is opened independently and bypasses controller mappings.
midi.autoconnect=true
midi.input=minilab
midi.input=arturia
midi.input=audiobox
midi.controller_musical_input=true
midi.performance_input=

# One JACK destination per active engine output, in order.
audio.autoconnect=true
audio.output=system:playback_1
audio.output=system:playback_2
# Ordered machine-owned stereo routes used only when the preferred pair above
# is unavailable. Values are LABEL|LEFT_JACK_PORT|RIGHT_JACK_PORT. Keep the
# internal analogue headphone jack separate: it is always tried last.
audio.internal_output=
audio.headphone_output=
# The measured owned effects graph remains opt-in. At runtime its output uses
# the resolved preferred/internal/headphone pair above without rewriting it.
audio.graph.enabled=false
audio.graph.client=shr-graph
audio.graph.maximum_callback_frames=4096
# The final bus software-monitors exactly one stereo JACK capture pair. Leave
# this blank to reuse the first legacy capture.input below. If the interface's
# own direct monitor is audible too, activation is refused until the doubled
# path is deliberately acknowledged.
audio.graph.input=
audio.graph.input_direct_monitoring=false
audio.graph.confirm_doubled_monitoring=false
# Optional zero-based CPU assigned to the one managed synth engine. Leave empty
# unless shr-audio-tune has reserved that CPU from normal system work.
audio.engine_cpu=

# Compatibility/default tracker destination. Songs can select
# different exact ALSA outputs and channels per page from the hardware UI.
# This bundled MT-240 route is only the original proof-of-concept profile.
# Four visible lanes are polyphonic lanes, not additional MIDI channels.
external_midi.enabled=false
external_midi.client=shs-tracker
external_midi.output=AudioBox USB 96
external_midi.max_tracks=2
external_midi.channel=1
external_midi.channel=2
external_midi.melody_channel=1
external_midi.percussion_channel=2
external_midi.percussion_program=9
# Optional tracker-edit input mapping for sparse, non-GM drum maps. Controller
# notes beginning at this base are mapped through repeated percussion_note
# entries; no entries means notes pass unchanged.
external_midi.percussion_input_base=60
external_midi.percussion_note=36
external_midi.percussion_note=38
external_midi.percussion_note=40
external_midi.percussion_note=41
external_midi.percussion_note=43
external_midi.percussion_note=45
external_midi.percussion_note=47
external_midi.percussion_note=48
external_midi.percussion_note=50
external_midi.percussion_note=52
external_midi.percussion_note=53
external_midi.percussion_note=60
external_midi.bank_select=off
external_midi.program_changes=true
external_midi.send_transport=false
external_midi.default_tempo=120
external_midi.pattern_rows=64
external_midi.steps_per_beat=4
external_midi.live_thru=false
external_midi.profile=casio-casiotone-mt-240
external_midi.gate_percent=80
external_midi.gesture_settle_ms=45

# Dedicated controller sync output. This is independent of tracker musical
# destinations and uses one exact ALSA MIDI output name. It sends only MIDI
# Timing Clock while SHR runs, plus tracker Start/Stop. Disabled by default.
controller_clock.enabled=false
controller_clock.client=shs-controller-clock
controller_clock.output=

# Legacy stereo JACK input pairs are NAME|LEFT|RIGHT. When no capture.track is
# present, the first pair migrates in memory to one linked left/right track.
# New generic tracks are ID|LABEL|GROUP|ROLE|ARMED|EXACT_JACK_SOURCE. ROLE is
# mono, left, or right. A blank source stays missing; it never means port zero.
capture.directory=~/.local/share/shsynth/recordings
capture.client=shs-recorder
capture.input=Soundcard|system:capture_1|system:capture_2
capture.track=
capture.ring_frames=262144
capture.maximum_callback_frames=4096

# FT2 WAV loop output. Imports are copied into the private XDG song-data tree;
# this directory is only the file-picker inbox. JACK is never started here.
loop.client=shs-loop
loop.import_directory=~/.local/share/shsynth/loop-inbox
loop.output=system:playback_1
loop.output=system:playback_2

# Linux thermal sensor, in thousandths of a degree Celsius. Empty disables it.
status.cpu_temperature_path=/sys/class/thermal/thermal_zone0/temp
